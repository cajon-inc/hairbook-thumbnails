<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>クリエイティブ管理 — カタログサムネ</title>
<style>
:root{
  --bg:#f3f1ec;--panel:#ffffff;--panel-2:#f7f5f1;--line:#e0dbd1;--line-2:#d2ccc0;
  --ink:#211d17;--ink-soft:#5f574a;--ink-faint:#8f8676;--gold:#9a7328;--gold-2:#b0872f;
  --ok:#4c7355;--warn:#b6802a;--danger:#c0472f;--sel:#e9dcbd;
  --font:-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",Meiryo,system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
@media (prefers-color-scheme:dark){:root{
  --bg:#141210;--panel:#1d1a15;--panel-2:#242019;--line:#332e25;--line-2:#403a2f;
  --ink:#ece7de;--ink-soft:#b3a996;--ink-faint:#867c6b;--gold:#cba85e;--gold-2:#dcbb6f;
  --ok:#7fa985;--warn:#d6a34e;--danger:#e0715a;--sel:#3a3220;
}}
:root[data-theme="light"]{--bg:#f3f1ec;--panel:#fff;--panel-2:#f7f5f1;--line:#e0dbd1;--line-2:#d2ccc0;--ink:#211d17;--ink-soft:#5f574a;--ink-faint:#8f8676;--sel:#e9dcbd;}
:root[data-theme="dark"]{--bg:#141210;--panel:#1d1a15;--panel-2:#242019;--line:#332e25;--line-2:#403a2f;--ink:#ece7de;--ink-soft:#b3a996;--ink-faint:#867c6b;--sel:#3a3220;}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased;}
button,input,select{font-family:inherit;}

/* top bar */
.topbar{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.brand{display:flex;flex-direction:column;line-height:1.1;}
.brand .ey{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.brand .t{font-weight:800;font-size:16px;}
.grow{flex:1;}
.search{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;min-width:180px;}
.search input{border:0;background:none;color:var(--ink);outline:none;width:100%;font-size:13px;}
select,.btn{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:7px 11px;font-size:13px;cursor:pointer;}
.btn:hover,select:hover{border-color:var(--line-2);}
.btn.pri{background:var(--gold);color:#fff;border-color:var(--gold);font-weight:600;}
:root[data-theme="dark"] .btn.pri{color:#141210;}
.btn.ghost{background:transparent;}

/* bulk bar */
.bulk{display:none;align-items:center;gap:10px;background:var(--sel);border:1px solid var(--gold);border-radius:10px;padding:7px 12px;font-size:13px;}
.bulk.on{display:flex;}
.bulk b{font-variant-numeric:tabular-nums;}

/* stats */
.stripe{display:flex;gap:8px;flex-wrap:wrap;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);}
.stat{font-family:var(--mono);font-size:12px;color:var(--ink-soft);background:var(--panel-2);border:1px solid var(--line);border-radius:100px;padding:4px 11px;}
.stat b{color:var(--ink);}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;padding:20px;}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .12s,box-shadow .12s;position:relative;}
.card:hover{border-color:var(--gold);box-shadow:0 4px 18px rgba(0,0,0,.09);}
.card.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold);}
.card.off{opacity:.55;}
.card .cv{width:100%;display:block;aspect-ratio:4/5;background:#ddd;}
.chk{position:absolute;top:9px;left:9px;width:22px;height:22px;border-radius:6px;border:1.5px solid #fff;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;z-index:2;}
.card.sel .chk{background:var(--gold);border-color:var(--gold);}
.cbody{padding:9px 11px 11px;}
.cname{font-weight:700;font-size:13px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.carea{font-size:11px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.crow{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.tag{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:100px;border:1px solid var(--line);color:var(--ink-soft);}
.tag.d{color:var(--gold);border-color:var(--gold);}
.tag.warn{color:var(--warn);border-color:var(--warn);}
.tag.off{color:var(--danger);border-color:var(--danger);}

/* detail drawer */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40;opacity:0;pointer-events:none;transition:opacity .15s;}
.scrim.on{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(460px,100%);background:var(--panel);border-left:1px solid var(--line);z-index:50;transform:translateX(100%);transition:transform .18s;display:flex;flex-direction:column;}
.drawer.on{transform:none;}
.dhead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);}
.dhead .t{font-weight:800;font-size:15px;}
.x{background:none;border:0;color:var(--ink-soft);font-size:22px;cursor:pointer;line-height:1;}
.dbody{overflow:auto;padding:18px;display:flex;flex-direction:column;gap:18px;}
.preview{width:100%;border-radius:10px;border:1px solid var(--line);display:block;aspect-ratio:4/5;background:#ddd;}
.field label{font-size:12px;color:var(--ink-soft);display:block;margin-bottom:5px;font-weight:600;}
.field input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;color:var(--ink);font-size:13px;outline:none;}
.field input:focus{border-color:var(--gold);}
.designs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dopt{border:1px solid var(--line);border-radius:9px;padding:6px;cursor:pointer;background:var(--panel-2);text-align:center;}
.dopt.on{border-color:var(--gold);box-shadow:0 0 0 1.5px var(--gold);}
.dopt canvas{width:100%;display:block;border-radius:5px;aspect-ratio:4/5;background:#ccc;}
.dopt .l{font-size:10.5px;margin-top:4px;color:var(--ink-soft);}
.dopt.on .l{color:var(--gold);font-weight:700;}
.sources{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.srcthumb{flex:none;width:66px;cursor:pointer;text-align:center;}
.srcthumb canvas,.srcthumb img{width:66px;height:82px;object-fit:cover;border-radius:8px;border:2px solid var(--line);display:block;background:#ccc;}
.srcthumb.on canvas,.srcthumb.on img{border-color:var(--gold);}
.srcthumb .l{font-size:10px;color:var(--ink-soft);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.srcthumb.on .l{color:var(--gold);font-weight:700;}
.srcbtns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.btn.sm{font-size:12px;padding:6px 10px;}
.toggle{display:flex;align-items:center;gap:10px;font-size:13px;}
.sw{width:42px;height:24px;border-radius:100px;background:var(--line-2);position:relative;cursor:pointer;transition:background .12s;flex:none;}
.sw.on{background:var(--gold);}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .12s;}
.sw.on::after{left:20px;}
.src{font-family:var(--mono);font-size:11px;color:var(--ink-faint);border-top:1px solid var(--line);padding-top:12px;}
.dfoot{border-top:1px solid var(--line);padding:12px 18px;display:flex;gap:10px;}
.dfoot .btn{flex:1;text-align:center;}

/* export modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:60;display:none;align-items:center;justify-content:center;padding:20px;}
.modal.on{display:flex;}
.mbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;max-width:640px;width:100%;max-height:80vh;display:flex;flex-direction:column;}
.mbox h3{margin:0;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px;}
.mbox textarea{flex:1;margin:0;border:0;background:var(--panel-2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:14px 18px;resize:none;outline:none;min-height:320px;}
.mbox .mfoot{padding:12px 18px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;}
.hint{padding:0 20px 22px;color:var(--ink-faint);font-size:12px;font-family:var(--mono);}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="ey">Hairbook · Catalog</span><span class="t">クリエイティブ管理</span></div>
  <div class="search">🔎<input id="q" placeholder="サロン名・エリアで検索"></div>
  <select id="fDesign"><option value="">デザイン: すべて</option></select>
  <select id="fStatus">
    <option value="">状態: すべて</option>
    <option value="on">有効</option>
    <option value="off">無効</option>
    <option value="low">要改善(低情報)</option>
  </select>
  <div class="grow"></div>
  <div class="bulk" id="bulk">
    <b><span id="selN">0</span>件</b>選択
    <select id="bulkDesign"><option value="">一括デザイン…</option></select>
    <button class="btn" id="bulkOn">有効化</button>
    <button class="btn" id="bulkOff">無効化</button>
    <button class="btn ghost" id="bulkClear">解除</button>
  </div>
  <button class="btn" id="btnExport">設定を書き出す</button>
  <button class="btn ghost" id="btnReset" title="ローカルの編集を破棄">リセット</button>
</div>

<div class="stripe" id="stripe"></div>
<div class="grid" id="grid"></div>
<div class="hint">プロトタイプ: プレビューはブラウザ内Canvasで合成。編集はこの端末に保存（localStorage）。「設定を書き出す」で得たJSONを <code>creative_config.json</code> として置くと、パイプライン(enrich.py)が反映します。</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhead"><div class="t" id="dTitle">編集</div><button class="x" id="dClose">×</button></div>
  <div class="dbody">
    <canvas class="preview" id="preview"></canvas>
    <div class="field"><label>画像ソース（元画像を選ぶ / 入稿する）</label>
      <div class="sources" id="dSources"></div>
      <div class="srcbtns">
        <label class="btn sm">⬆ 入稿<input type="file" id="upFile" accept="image/*" hidden></label>
        <button class="btn sm" id="genFrames">🎬 動画から別フレーム</button>
        <button class="btn sm" id="genAI">✨ AI生成</button>
      </div>
    </div>
    <div class="field"><label>デザイン（帯）</label><div class="designs" id="dDesigns"></div></div>
    <div class="field"><label>サロン名</label><input id="fSalon"></div>
    <div class="field"><label>エリア</label><input id="fArea"></div>
    <div class="field"><label>特典バッジ（任意）</label><input id="fBadge" placeholder="例: 新規20%OFF"></div>
    <div class="toggle"><div class="sw" id="swEnabled"></div><span id="enLbl">有効（帯を付与して配信）</span></div>
    <div class="src" id="dSrc"></div>
  </div>
  <div class="dfoot">
    <button class="btn" id="dResetItem">この画像の変更を戻す</button>
    <button class="btn pri" id="dDone">完了</button>
  </div>
</aside>

<div class="modal" id="modal">
  <div class="mbox">
    <h3>creative_config.json（パイプラインが読む個別設定）</h3>
    <textarea id="exportText" readonly></textarea>
    <div class="mfoot"><button class="btn" id="copyCfg">コピー</button><button class="btn pri" id="closeModal">閉じる</button></div>
  </div>
</div>

<script>
const ITEMS = __ITEMS_JSON__;
const FONT = '"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",Meiryo,sans-serif';
const DESIGNS = [
  ["bottom_scrim","スタンダード ★"],["caption","キャプション"],["magazine","マガジン"],
  ["letterbox","シネマ"],["namecard","ネームカード"],["tategaki","縦書き"],
  ["frameline","フレーム"],["polaroid","ポラロイド"],["poster","ポスター"],["plate","プレート"],
];
const DLABEL = Object.fromEntries(DESIGNS);
const SAFE=0.148, REF=1080, DARK='rgba(20,16,12,';
/* パレット: 墨・生成り・くすみ金の3色系。原色/赤系は使わない（チラシ化するため） */
const INK='#221c15', IVORY='#f5f1e8', PAPER='#fdfbf6', MUTE='#8d8477', GOLD='#b08d57', GOLDL='#dcbb82';
const MINCHO='"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif';

/* ---------- state (localStorage overlay) ---------- */
const LS='hb_creative_cfg_v1';
let overrides = JSON.parse(localStorage.getItem(LS) || '{}');
let sourceSel = {};   // id -> 選択中の元画像dataURL（アップロード/別フレーム/AI）。大きいので端末メモリのみ
let sourceLabel = {}; // id -> 選択中ソースの表示名
let candidates = {};  // id -> [{label,src,key}] 生成/入稿した候補
const imgCache = {};
function baseItem(id){ return ITEMS.find(x=>x.id===id); }
function view(it){ const o=overrides[it.id]||{}; return {
  id:it.id, hash:it.hash, verdict:it.verdict, img:sourceSel[it.id]||it.img,
  salon:o.salon??it.salon, area:o.area??it.area, badge:o.badge??it.badge??'',
  design:o.design||it.design||'bottom_scrim', enabled:o.enabled!==false }; }
function setOv(id,patch){ overrides[id]=Object.assign({},overrides[id],patch); localStorage.setItem(LS,JSON.stringify(overrides)); }
function loadImgSrc(src){ return new Promise(res=>{ if(imgCache[src]) return res(imgCache[src]);
  const im=new Image(); im.onload=()=>{imgCache[src]=im;res(im);}; im.onerror=()=>res(null); im.src=src; }); }

/* ---------- canvas band renderers (overlays.py のJS版) ---------- */
function met(W){const s=W/REF,inset=Math.round(W*SAFE),left=inset+Math.round(40*s),right=W-inset-Math.round(40*s);return{s,inset,left,right,usable:Math.max(60,right-left)};}
function fit(ctx,t,w,start,min,maxw,fam){fam=fam||FONT;let sz=start;for(;sz>=min;sz-=2){ctx.font=`${w} ${sz}px ${fam}`;if(ctx.measureText(t).width<=maxw)return sz;}return min;}
function ell(ctx,t,maxw){if(!t)return'';if(ctx.measureText(t).width<=maxw)return t;let s=t;while(s.length&&ctx.measureText(s+'…').width>maxw)s=s.slice(0,-1);return s+'…';}
function leg(ctx,x,y,t,fill,s,halo=true){ctx.save();ctx.textBaseline='top';if(halo){ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=Math.max(3,7*s);ctx.shadowOffsetY=Math.max(1,2*s);}ctx.fillStyle=fill;ctx.fillText(t,x,y);ctx.restore();}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
/* 字間(letter-spacing)付き描画。canvasのletterSpacingはSafari互換が不安なので手動 */
function spW(ctx,t,ls){let w=0;for(const ch of t)w+=ctx.measureText(ch).width+ls;return Math.max(0,w-ls);}
function spTxt(ctx,t,x,y,ls,fill,s,halo){ctx.save();ctx.textAlign='left';ctx.textBaseline='top';let cx=x;for(const ch of t){if(halo)leg(ctx,cx,y,ch,fill,s);else{ctx.fillStyle=fill;ctx.fillText(ch,cx,y);}cx+=ctx.measureText(ch).width+ls;}ctx.restore();}
/* 元画像の下部に焼き込まれたキャプション(店名等)を沈める控えめなフェード */
function fade(ctx,W,H,a,y0){y0=y0||0.7;const g=ctx.createLinearGradient(0,H*y0,0,H);g.addColorStop(0,DARK+'0)');g.addColorStop(1,DARK+a+')');ctx.fillStyle=g;ctx.fillRect(0,H*y0,W,H*(1-y0));}
/* バッジ: dark=画像上（墨の半透明+金ケイ線+シャンパン文字） / ink=紙面上（墨ベタ+生成り文字） */
function badge(ctx,W,text,anchorX,topY,s,style,alignRight){if(!text)return;if(alignRight===undefined)alignRight=true;
  ctx.save();ctx.textAlign='left';ctx.textBaseline='top';
  const fs=23*s,ls=2*s;ctx.font=`600 ${fs}px ${FONT}`;const tw=spW(ctx,text,ls);
  const padx=18*s,pady=11*s,w=tw+2*padx,h=fs+2*pady,x=alignRight?anchorX-w:anchorX;
  rr(ctx,x,topY,w,h,5*s);
  if(style==='ink'){ctx.fillStyle=INK;ctx.fill();spTxt(ctx,text,x+padx,topY+pady,ls,IVORY,s,false);}
  else{ctx.fillStyle='rgba(21,17,12,.5)';ctx.fill();ctx.strokeStyle='rgba(200,166,110,.9)';ctx.lineWidth=Math.max(1,1.5*s);ctx.stroke();spTxt(ctx,text,x+padx,topY+pady,ls,'#ecd3a1',s,false);}
  ctx.restore();}

/* 1) スタンダード ★ — 柔らかい下部グラデ＋中太ゴシック＋金のヘアライン。既定 */
function bottomScrim(ctx,W,H,it){const{s,left,right,usable}=met(W);
  const g=ctx.createLinearGradient(0,H*0.52,0,H);g.addColorStop(0,DARK+'0)');g.addColorStop(0.55,DARK+'.5)');g.addColorStop(0.85,DARK+'.9)');g.addColorStop(1,DARK+'.97)');ctx.fillStyle=g;ctx.fillRect(0,H*0.52,W,H*0.48);
  ctx.textBaseline='top';
  const ss=fit(ctx,it.salon,'600',54*s,34*s,usable);ctx.font=`600 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,usable);
  const as=25*s;ctx.font=`500 ${as}px ${FONT}`;const area=it.area?ell(ctx,it.area,usable-24*s):'';
  const gap=15*s,block=ss+(area?gap+as:0);let y=H-66*s-block;
  ctx.fillStyle=GOLD;ctx.fillRect(left,y-26*s,44*s,Math.max(1.5,2.5*s));
  ctx.font=`600 ${ss}px ${FONT}`;leg(ctx,left,y,salon,'#fff',s);
  if(area){ctx.font=`500 ${as}px ${FONT}`;spTxt(ctx,area,left,y+ss+gap,2.4*s,'rgba(255,255,255,.88)',s,true);}
  badge(ctx,W,it.badge,right,54*s,s,'dark');}

/* 2) キャプション — 中央揃えの小さな署名。写真を最大限見せる */
function caption(ctx,W,H,it){const{s,right,usable}=met(W);
  const g=ctx.createLinearGradient(0,H*0.62,0,H);g.addColorStop(0,DARK+'0)');g.addColorStop(0.55,DARK+'.45)');g.addColorStop(1,DARK+'.85)');ctx.fillStyle=g;ctx.fillRect(0,H*0.62,W,H*0.38);
  ctx.textBaseline='top';ctx.textAlign='center';
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=Math.max(1,1.6*s);ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=4*s;ctx.beginPath();ctx.moveTo(W/2,H-192*s);ctx.lineTo(W/2,H-160*s);ctx.stroke();ctx.restore();
  const ss=fit(ctx,it.salon,'500',40*s,26*s,usable);ctx.font=`500 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,usable);
  leg(ctx,W/2,H-138*s,salon,'#fff',s);
  if(it.area){const as=22*s;ctx.font=`400 ${as}px ${FONT}`;const area=ell(ctx,it.area,usable);leg(ctx,W/2,H-138*s+ss+12*s,area,'rgba(255,255,255,.82)',s);}
  ctx.textAlign='left';badge(ctx,W,it.badge,right,54*s,s,'dark');}

/* 3) マガジン — 上部センター構図。アイブロウ＋ケイ線＋明朝タイトル */
function magazine(ctx,W,H,it){const{s,left,right,usable}=met(W);
  const g=ctx.createLinearGradient(0,0,0,H*0.4);g.addColorStop(0,DARK+'.6)');g.addColorStop(1,DARK+'0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.4);
  fade(ctx,W,H,'.55');
  ctx.textBaseline='top';
  const ey=19*s;ctx.font=`500 ${ey}px ${FONT}`;const eyT='HAIR & BEAUTY';const eyW=spW(ctx,eyT,6*s);
  spTxt(ctx,eyT,W/2-eyW/2,66*s,6*s,'rgba(255,255,255,.92)',s,true);
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=Math.max(1,1.5*s);ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=3*s;
  const ry=66*s+ey*0.62;ctx.beginPath();ctx.moveTo(left,ry);ctx.lineTo(W/2-eyW/2-24*s,ry);ctx.moveTo(W/2+eyW/2+24*s,ry);ctx.lineTo(right,ry);ctx.stroke();ctx.restore();
  ctx.textAlign='center';
  const ss=fit(ctx,it.salon,'600',60*s,36*s,usable,MINCHO);ctx.font=`600 ${ss}px ${MINCHO}`;const salon=ell(ctx,it.salon,usable);
  leg(ctx,W/2,66*s+ey+22*s,salon,'#fff',s);
  if(it.area){const as=23*s;ctx.font=`500 ${as}px ${FONT}`;const area=ell(ctx,it.area,usable);leg(ctx,W/2,66*s+ey+22*s+ss+14*s,area,'rgba(255,255,255,.85)',s);}
  ctx.textAlign='left';
  badge(ctx,W,it.badge,right,H-114*s,s,'dark');}

/* 4) シネマ — 生成りのレターボックス。下段に明朝の墨文字 */
function letterbox(ctx,W,H,it){const{s,right,usable}=met(W);const topH=52*s,botH=186*s;
  ctx.fillStyle=IVORY;ctx.fillRect(0,0,W,topH);ctx.fillRect(0,H-botH,W,botH);
  ctx.textBaseline='top';ctx.textAlign='center';
  const ss=fit(ctx,it.salon,'600',52*s,32*s,usable,MINCHO);ctx.font=`600 ${ss}px ${MINCHO}`;const salon=ell(ctx,it.salon,usable);
  const as=23*s;ctx.font=`500 ${as}px ${FONT}`;const area=it.area?ell(ctx,it.area,usable):'';
  const block=ss+(area?13*s+as:0);let y=H-botH+(botH-block)/2;
  ctx.fillStyle=INK;ctx.font=`600 ${ss}px ${MINCHO}`;ctx.fillText(salon,W/2,y);
  if(area){ctx.fillStyle=MUTE;ctx.font=`500 ${as}px ${FONT}`;ctx.fillText(area,W/2,y+ss+13*s);}
  ctx.textAlign='left';
  badge(ctx,W,it.badge,right,topH+22*s,s,'dark');}

/* 5) ネームカード — 左下の紙のカード。影＋金ルール */
function namecard(ctx,W,H,it){const{s,left,right,usable}=met(W);const pad=28*s;
  fade(ctx,W,H,'.45');
  ctx.textBaseline='top';
  const maxw=usable*0.82-2*pad;
  const ss=fit(ctx,it.salon,'700',40*s,26*s,maxw);ctx.font=`700 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,maxw);const tw1=ctx.measureText(salon).width;
  const as=22*s;ctx.font=`500 ${as}px ${FONT}`;const area=it.area?ell(ctx,it.area,maxw):'';const tw2=area?ctx.measureText(area).width:0;
  const cw=Math.max(tw1,tw2)+2*pad,ch=pad+ss+(area?13*s+2.5*s+13*s+as:0)+pad,y0=H-60*s-ch;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.28)';ctx.shadowBlur=20*s;ctx.shadowOffsetY=8*s;rr(ctx,left,y0,cw,ch,5*s);ctx.fillStyle=PAPER;ctx.fill();ctx.restore();
  ctx.fillStyle=INK;ctx.font=`700 ${ss}px ${FONT}`;ctx.fillText(salon,left+pad,y0+pad);
  if(area){ctx.fillStyle=GOLD;ctx.fillRect(left+pad,y0+pad+ss+13*s,34*s,Math.max(1.5,2.5*s));ctx.fillStyle=MUTE;ctx.font=`500 ${as}px ${FONT}`;ctx.fillText(area,left+pad,y0+pad+ss+13*s+2.5*s+13*s);}
  badge(ctx,W,it.badge,right,54*s,s,'dark');}

/* 6) 縦書き — 右端の縦組み明朝。英数字は90°回転で組む */
function tategaki(ctx,W,H,it){const{s,left,right}=met(W);
  const g=ctx.createLinearGradient(W,0,W*0.45,0);g.addColorStop(0,DARK+'.6)');g.addColorStop(1,DARK+'0)');ctx.fillStyle=g;ctx.fillRect(W*0.45,0,W*0.55,H);
  fade(ctx,W,H,'.5');
  function col(text,x,fs,fill,w){const lim=H-150*s;let y=66*s;
    ctx.save();ctx.font=`${w} ${fs}px ${MINCHO}`;ctx.fillStyle=fill;ctx.shadowColor='rgba(0,0,0,.55)';ctx.shadowBlur=6*s;ctx.shadowOffsetY=2*s;
    const runs=[];let buf='';
    for(const ch of [...text]){if(/[0-9A-Za-z'&.\- ]/.test(ch)){buf+=ch;}else{if(buf){runs.push([buf,1]);buf='';}runs.push([ch,0]);}}
    if(buf)runs.push([buf,1]);
    for(const[t,lat]of runs){
      if(lat){const tw=ctx.measureText(t).width;if(y+tw>lim)break;
        ctx.save();ctx.translate(x,y);ctx.rotate(Math.PI/2);ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(t,0,0);ctx.restore();y+=tw+8*s;}
      else{if(y+fs>lim)break;ctx.textAlign='center';ctx.textBaseline='top';ctx.fillText(t,x,y);y+=fs*1.1;}
    }
    ctx.restore();}
  col(it.salon,right-30*s,44*s,'#fff','600');
  if(it.area)col(it.area,right-88*s,23*s,'rgba(255,255,255,.85)','500');
  badge(ctx,W,it.badge,left,H-110*s,s,'dark',false);}

/* 7) フレーム — 内側ヘアライン枠。下辺をサロン名が破って乗る */
function frameline(ctx,W,H,it){const{s}=met(W);const m=46*s;
  fade(ctx,W,H,'.6');
  ctx.textBaseline='middle';ctx.textAlign='center';
  const maxw=W-2*m-120*s;
  const ss=fit(ctx,it.salon,'600',40*s,26*s,maxw);ctx.font=`600 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,maxw);const tw=ctx.measureText(salon).width;
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.95)';ctx.lineWidth=Math.max(1,2*s);ctx.shadowColor='rgba(0,0,0,.45)';ctx.shadowBlur=5*s;
  const gap=tw/2+26*s;
  ctx.beginPath();ctx.moveTo(W/2-gap,H-m);ctx.lineTo(m,H-m);ctx.lineTo(m,m);ctx.lineTo(W-m,m);ctx.lineTo(W-m,H-m);ctx.lineTo(W/2+gap,H-m);ctx.stroke();ctx.restore();
  ctx.save();ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=6*s;ctx.fillStyle='#fff';ctx.font=`600 ${ss}px ${FONT}`;ctx.fillText(salon,W/2,H-m);ctx.restore();
  if(it.area){const as=22*s;ctx.font=`500 ${as}px ${FONT}`;const area=ell(ctx,it.area,maxw);ctx.save();ctx.shadowColor='rgba(0,0,0,.6)';ctx.shadowBlur=5*s;ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillText(area,W/2,H-m-ss/2-24*s);ctx.restore();}
  ctx.textAlign='left';ctx.textBaseline='top';
  badge(ctx,W,it.badge,W-m-20*s,m+20*s,s,'dark');}

/* 8) ポラロイド — 白マット。下余白に明朝キャプション */
function polaroid(ctx,W,H,it){const{s}=met(W);const side=38*s,top=38*s,bot=196*s;
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,top);ctx.fillRect(0,H-bot,W,bot);ctx.fillRect(0,0,side,H);ctx.fillRect(W-side,0,side,H);
  ctx.strokeStyle='rgba(33,26,18,.1)';ctx.lineWidth=Math.max(1,1.5*s);ctx.strokeRect(side,top,W-2*side,H-top-bot);
  ctx.textBaseline='top';ctx.textAlign='center';
  const maxw=W-2*side-40*s;
  const ss=fit(ctx,it.salon,'600',46*s,30*s,maxw,MINCHO);ctx.font=`600 ${ss}px ${MINCHO}`;const salon=ell(ctx,it.salon,maxw);
  const as=23*s;ctx.font=`500 ${as}px ${FONT}`;const area=it.area?ell(ctx,it.area,maxw):'';
  const block=ss+(area?13*s+as:0);let y=H-bot+(bot-block)/2+4*s;
  ctx.fillStyle=INK;ctx.font=`600 ${ss}px ${MINCHO}`;ctx.fillText(salon,W/2,y);
  if(area){ctx.fillStyle=MUTE;ctx.font=`500 ${as}px ${FONT}`;ctx.fillText(area,W/2,y+ss+13*s);}
  ctx.textAlign='left';
  badge(ctx,W,it.badge,W-side-18*s,top+18*s,s,'dark');}

/* 9) ポスター — エリアを小さなキッカーに、サロン名を特大に。声の大きい版 */
function poster(ctx,W,H,it){const{s,left,right,usable}=met(W);
  const g=ctx.createLinearGradient(0,H*0.34,0,H);g.addColorStop(0,DARK+'0)');g.addColorStop(0.65,DARK+'.62)');g.addColorStop(1,DARK+'.94)');ctx.fillStyle=g;ctx.fillRect(0,H*0.34,W,H*0.66);
  ctx.textBaseline='top';
  const ss=fit(ctx,it.salon,'800',96*s,50*s,usable);ctx.font=`800 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,usable);
  const as=25*s;
  const kick=it.area?as+20*s:0,block=kick+ss;let y=H-88*s-block;
  if(it.area){ctx.font=`600 ${as}px ${FONT}`;const area=ell(ctx,it.area,usable-30*s);spTxt(ctx,area,left,y,3*s,GOLDL,s,true);y+=as+20*s;}
  ctx.font=`800 ${ss}px ${FONT}`;leg(ctx,left,y,salon,'#fff',s);
  badge(ctx,W,it.badge,right,54*s,s,'dark');}

/* 10) プレート — 中央下の生成りプレート＋金の上端。整った強調版 */
function plate(ctx,W,H,it){const{s,right}=met(W);const pad=30*s;
  fade(ctx,W,H,'.5');
  ctx.textBaseline='top';ctx.textAlign='center';
  const maxw=W*0.66-2*pad;
  const ss=fit(ctx,it.salon,'700',42*s,28*s,maxw);ctx.font=`700 ${ss}px ${FONT}`;const salon=ell(ctx,it.salon,maxw);const tw1=ctx.measureText(salon).width;
  const as=22*s;ctx.font=`500 ${as}px ${FONT}`;const area=it.area?ell(ctx,it.area,maxw):'';const tw2=area?ctx.measureText(area).width:0;
  const iw=Math.max(tw1,tw2)+2*pad,ih=pad+ss+(area?12*s+as:0)+pad*0.9,x0=(W-iw)/2,y0=H-64*s-ih;
  ctx.save();ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=22*s;ctx.shadowOffsetY=8*s;rr(ctx,x0,y0,iw,ih,4*s);ctx.fillStyle='rgba(251,248,242,.97)';ctx.fill();ctx.restore();
  ctx.fillStyle=GOLD;ctx.fillRect(x0,y0,iw,Math.max(2,3.5*s));
  ctx.fillStyle=INK;ctx.font=`700 ${ss}px ${FONT}`;ctx.fillText(salon,W/2,y0+pad);
  if(area){ctx.fillStyle=MUTE;ctx.font=`500 ${as}px ${FONT}`;ctx.fillText(area,W/2,y0+pad+ss+12*s);}
  ctx.textAlign='left';
  badge(ctx,W,it.badge,right,54*s,s,'dark');}

const RENDER={bottom_scrim:bottomScrim,caption:caption,magazine:magazine,letterbox:letterbox,namecard:namecard,tategaki:tategaki,frameline:frameline,polaroid:polaroid,poster:poster,plate:plate};

async function draw(canvas,it,px){const im=await loadImgSrc(it.img);const W=px,H=Math.round(px*1.25);canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,W,H);if(im)ctx.drawImage(im,0,0,W,H);else{ctx.fillStyle='#bbb';ctx.fillRect(0,0,W,H);}if(it.enabled)(RENDER[it.design]||bottomScrim)(ctx,W,H,it,im);}
function drawPlain(canvas,src,px){loadImgSrc(src).then(im=>{const W=px,H=Math.round(px*1.25);canvas.width=W;canvas.height=H;const ctx=canvas.getContext('2d');if(im)ctx.drawImage(im,0,0,W,H);else{ctx.fillStyle='#bbb';ctx.fillRect(0,0,W,H);}});}

/* ---------- grid ---------- */
const grid=document.getElementById('grid');
const selected=new Set();
function statusTag(v){ if(v.enabled===false)return'<span class="tag off">無効</span>'; if(v.verdict==='low_info'||v.verdict==='broken')return'<span class="tag warn">要改善</span>'; return''; }
function renderGrid(){
  const q=document.getElementById('q').value.trim();
  const fd=document.getElementById('fDesign').value, fs=document.getElementById('fStatus').value;
  grid.innerHTML='';
  let shown=0;
  ITEMS.forEach(base=>{
    const v=view(base);
    if(q && !((v.salon||'').includes(q)||(v.area||'').includes(q)))return;
    if(fd && v.design!==fd)return;
    if(fs==='on'&&!v.enabled)return; if(fs==='off'&&v.enabled)return;
    if(fs==='low'&&!(v.verdict==='low_info'||v.verdict==='broken'))return;
    shown++;
    const el=document.createElement('div');
    el.className='card'+(selected.has(v.id)?' sel':'')+(v.enabled?'':' off');
    el.innerHTML=`<div class="chk">${selected.has(v.id)?'✓':''}</div><canvas class="cv"></canvas>
      <div class="cbody"><div class="cname">${v.salon||'—'}</div><div class="carea">${v.area||''}</div>
      <div class="crow"><span class="tag d">${DLABEL[v.design]||v.design}</span>${statusTag(v)}</div></div>`;
    grid.appendChild(el);
    draw(el.querySelector('canvas'),v,300);
    el.querySelector('.chk').addEventListener('click',e=>{e.stopPropagation();toggleSel(v.id);});
    el.addEventListener('click',()=>openDrawer(v.id));
  });
  renderStripe(shown);
}
function renderStripe(shown){
  const all=ITEMS.map(view);const on=all.filter(v=>v.enabled).length;const low=all.filter(v=>v.verdict==='low_info'||v.verdict==='broken').length;
  const edited=new Set([...Object.keys(overrides),...Object.keys(sourceSel)]).size;
  document.getElementById('stripe').innerHTML=
    `<span class="stat">表示 <b>${shown}</b>/${ITEMS.length}</span><span class="stat">有効 <b>${on}</b></span>`+
    `<span class="stat">無効 <b>${ITEMS.length-on}</b></span><span class="stat">要改善 <b>${low}</b></span><span class="stat">編集済 <b>${edited}</b></span>`;
}
function toggleSel(id){selected.has(id)?selected.delete(id):selected.add(id);syncBulk();renderGrid();}
function syncBulk(){const b=document.getElementById('bulk');b.classList.toggle('on',selected.size>0);document.getElementById('selN').textContent=selected.size;}

/* ---------- drawer ---------- */
let cur=null;
function openDrawer(id){cur=id;const v=view(baseItem(id));
  document.getElementById('dTitle').textContent=v.salon||id;
  document.getElementById('fSalon').value=v.salon||'';
  document.getElementById('fArea').value=v.area||'';
  document.getElementById('fBadge').value=v.badge||'';
  document.getElementById('swEnabled').classList.toggle('on',v.enabled);
  document.getElementById('dSrc').textContent=`id ${v.id}  ·  情報判定 ${v.verdict||'-'}  ·  hash ${(v.hash||'').slice(0,10)}`;
  buildSources(v);
  buildDesignOpts(v);
  refreshPreview();
  document.getElementById('scrim').classList.add('on');document.getElementById('drawer').classList.add('on');
}
function closeDrawer(){document.getElementById('scrim').classList.remove('on');document.getElementById('drawer').classList.remove('on');cur=null;renderGrid();}
function curView(){return view(baseItem(cur));}
function refreshPreview(){draw(document.getElementById('preview'),curView(),440);}
function buildDesignOpts(v){const wrap=document.getElementById('dDesigns');wrap.innerHTML='';DESIGNS.forEach(([key,label])=>{
  const o=document.createElement('div');o.className='dopt'+(v.design===key?' on':'');
  o.innerHTML=`<canvas></canvas><div class="l">${label}</div>`;wrap.appendChild(o);
  draw(o.querySelector('canvas'),Object.assign({},v,{design:key}),150);
  o.addEventListener('click',()=>{setOv(cur,{design:key});document.querySelectorAll('.dopt').forEach(d=>d.classList.remove('on'));o.classList.add('on');refreshPreview();});
});}
/* ---- 画像ソース: 選択 / 入稿 / 動画別フレーム / AI生成 ---- */
function buildSources(v){const wrap=document.getElementById('dSources');wrap.innerHTML='';
  const base=baseItem(cur);const sel=sourceSel[cur]||base.img;
  const list=[{label:'現在',src:base.img,key:'current'}].concat(candidates[cur]||[]);
  list.forEach(c=>{const el=document.createElement('div');el.className='srcthumb'+(c.src===sel?' on':'');
    el.innerHTML=`<canvas></canvas><div class="l">${c.label}</div>`;wrap.appendChild(el);
    drawPlain(el.querySelector('canvas'),c.src,132);
    el.addEventListener('click',()=>{ if(c.key==='current'){delete sourceSel[cur];delete sourceLabel[cur];}else{sourceSel[cur]=c.src;sourceLabel[cur]=c.label;} afterSourceChange(); });
  });}
function afterSourceChange(){buildSources(curView());refreshPreview();buildDesignOpts(curView());}
function addCandidate(label,src,key,select){candidates[cur]=candidates[cur]||[];candidates[cur].push({label,src,key});if(select!==false){sourceSel[cur]=src;sourceLabel[cur]=label;}afterSourceChange();}
/* 疑似フレーム: 縦横比4:5を保ったまま (縦位置oy, ズームzoom, 横位置ox) を変えて切り出す */
function frameVariant(im,oy,zoom,ox){const AR=0.8;let w=Math.min(im.width,im.height*AR)/zoom,h=w/AR;if(h>im.height){h=im.height/zoom;w=h*AR;}const sx=(im.width-w)*ox,sy=(im.height-h)*oy;const outW=Math.max(1,Math.min(Math.round(w),840));const cv=document.createElement('canvas');cv.width=outW;cv.height=Math.round(outW*1.25);cv.getContext('2d').drawImage(im,sx,sy,w,h,0,0,cv.width,cv.height);return cv.toDataURL('image/jpeg',0.82);}
const FRAME_PARAMS=[ /* [縦位置, ズーム, 横位置] — ズーム大=クロップが狭く、位置差がはっきり出る */
 [0.00,1.55,0.50],[1.00,1.55,0.50],[0.50,1.70,0.50],   // 上端 / 下端 / 中央(縦の振り)
 [0.00,2.10,0.00],[0.00,2.10,1.00],[1.00,2.10,0.00],   // 四隅を大きく寄せる
 [1.00,2.10,1.00],[0.50,2.30,0.00],[0.50,2.30,1.00],   // 左右いっぱい
 [0.15,1.90,0.15],[0.15,1.90,0.85],[0.85,1.90,0.50],
 [0.10,2.40,0.50],[0.90,2.40,0.50],[0.50,1.45,0.50],   // 強ズーム上下 / 全体寄り
 [0.30,1.75,0.20],[0.30,1.75,0.80],[0.70,1.75,0.20],
 [0.70,1.75,0.80],[0.25,2.20,0.05],[0.25,2.20,0.95],
 [0.75,2.20,0.05],[0.75,2.20,0.95],[0.50,2.00,0.50]];
function frameParams(i){if(i<FRAME_PARAMS.length)return FRAME_PARAMS[i];const fr=x=>x-Math.floor(x);return[fr(i*0.618+0.05),1.5+1.0*fr(i*0.382+0.17),fr(i*0.754+0.31)];}
function frameLabel(i){return 'フレーム'+(i<26?String.fromCharCode(65+i):String(i+1));}
function aiVariant(im){const cv=document.createElement('canvas');cv.width=im.width;cv.height=Math.round(im.width*1.25);const ctx=cv.getContext('2d');ctx.filter='saturate(1.55) contrast(1.12) brightness(1.03)';ctx.drawImage(im,0,0,cv.width,cv.height);ctx.filter='none';const g=ctx.createRadialGradient(cv.width/2,cv.height/2,cv.width*0.3,cv.width/2,cv.height/2,cv.width*0.78);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.32)');ctx.fillStyle=g;ctx.fillRect(0,0,cv.width,cv.height);return cv.toDataURL('image/jpeg',0.85);}
document.getElementById('upFile').addEventListener('change',e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>addCandidate('入稿',r.result,'upload');r.readAsDataURL(f);e.target.value='';});
let frameSeq={}; // id -> 次に生成するフレーム番号（クリックごとに続きから別フレームを出す）
document.getElementById('genFrames').addEventListener('click',async()=>{
  const id=cur;if(!id)return;
  const selSrc=sourceSel[id];
  const selC=(candidates[id]||[]).find(c=>c.src===selSrc);
  // 生成済みフレーム選択中でも、クロップを重ね掛けせず親画像から切り出す
  const baseSrc=(selC&&selC.key==='frame'&&selC.parent)?selC.parent:(selSrc||baseItem(id).img);
  const n0=frameSeq[id]||0;frameSeq[id]=n0+6; // await前に予約（連打で同じ番号を二重生成しない）
  const im=await loadImgSrc(baseSrc);if(!im)return;
  candidates[id]=candidates[id]||[];
  for(let k=0;k<6;k++){const i=n0+k;const[oy,zm,ox]=frameParams(i);
    candidates[id].push({label:frameLabel(i),src:frameVariant(im,oy,zm,ox),key:'frame',parent:baseSrc,params:{oy,zoom:zm,ox}});}
  if(cur!==id)return; // 読み込み中にドロワーが閉じた/別アイテムに移った場合はUI更新しない
  afterSourceChange();
  const sw=document.getElementById('dSources');sw.scrollLeft=sw.scrollWidth;});
document.getElementById('genAI').addEventListener('click',async()=>{const id=cur;if(!id)return;const im=await loadImgSrc(sourceSel[id]||baseItem(id).img);if(!im||cur!==id)return;addCandidate('AI(サンプル)',aiVariant(im),'ai');});

document.getElementById('fSalon').addEventListener('input',e=>{setOv(cur,{salon:e.target.value});refreshPreview();buildMiniLater();});
document.getElementById('fArea').addEventListener('input',e=>{setOv(cur,{area:e.target.value});refreshPreview();});
document.getElementById('fBadge').addEventListener('input',e=>{setOv(cur,{badge:e.target.value});refreshPreview();});
document.getElementById('swEnabled').addEventListener('click',e=>{const on=!e.target.classList.contains('on');e.target.classList.toggle('on',on);setOv(cur,{enabled:on});refreshPreview();});
let miniT;function buildMiniLater(){clearTimeout(miniT);miniT=setTimeout(()=>buildDesignOpts(curView()),350);}
document.getElementById('dClose').addEventListener('click',closeDrawer);
document.getElementById('scrim').addEventListener('click',closeDrawer);
document.getElementById('dDone').addEventListener('click',closeDrawer);

document.getElementById('bulkOn').addEventListener('click',()=>{selected.forEach(id=>setOv(id,{enabled:true}));renderGrid();});
document.getElementById('bulkOff').addEventListener('click',()=>{selected.forEach(id=>setOv(id,{enabled:false}));renderGrid();});
document.getElementById('btnReset').addEventListener('click',()=>{if(confirm('この端末の編集をすべて破棄しますか？')){overrides={};sourceSel={};sourceLabel={};candidates={};frameSeq={};localStorage.removeItem(LS);selected.clear();syncBulk();renderGrid();}});
document.getElementById('btnExport').addEventListener('click',()=>{
  const cfg={};ITEMS.forEach(base=>{const o=overrides[base.id]||{};const hasSrc=!!sourceSel[base.id];if(Object.keys(o).length||hasSrc){const v=view(base);const e={design:v.design,salon:v.salon,area:v.area,badge:v.badge,enabled:v.enabled};if(hasSrc){e.source=sourceLabel[base.id]||'custom';const sc=(candidates[base.id]||[]).find(c=>c.src===sourceSel[base.id]);if(sc&&sc.params)e.source_params=sc.params;}cfg[base.id]=e;}});
  document.getElementById('exportText').value=JSON.stringify(cfg,null,2);document.getElementById('modal').classList.add('on');});
document.getElementById('closeModal').addEventListener('click',()=>document.getElementById('modal').classList.remove('on'));
document.getElementById('copyCfg').addEventListener('click',()=>{const t=document.getElementById('exportText');t.select();document.execCommand&&document.execCommand('copy');navigator.clipboard&&navigator.clipboard.writeText(t.value);});

/* ---------- init ---------- */
DESIGNS.forEach(([k,l])=>{const a=new Option('デザイン: '+l.replace(' ★',''),k);document.getElementById('fDesign').add(a);const b=new Option(l.replace(' ★',''),k);document.getElementById('bulkDesign').add(b);});
renderGrid();
</script>
</body>
</html>
